name: Test Blob Storage Write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-blob-write:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Write test file to Blob Container
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "cicd-test-$(date -u +%Y%m%dT%H%M%SZ)" > test.txt

            az storage blob upload \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --container-name ${{ secrets.AZURE_STORAGE_CONTAINER }} \
              --name "test-runs/test-$(date -u +%Y%m%dT%H%M%SZ).txt" \
              --file test.txt \
              --auth-mode login \
              --overwrite

      - name: Verify blob exists
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob list \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --container-name ${{ secrets.AZURE_STORAGE_CONTAINER }} \
              --prefix "test-runs/" \
              --auth-mode login \
              --output table

      - name: Azure Logout
        if: always()
        run: az logout
